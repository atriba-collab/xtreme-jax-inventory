<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xtreme-Jax Inventory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh}
.header{background:#0a1628;padding:1rem 1.25rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.logo{font-size:11px;font-weight:600;color:#c9a84c;letter-spacing:.08em}
.title{font-size:18px;font-weight:600;color:#fff;margin-top:1px}
.sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:1px}
.fields{background:#fff;padding:.85rem 1.25rem;border-bottom:1px solid #e5e7eb;display:flex;flex-direction:column;gap:12px}
.field-label{font-size:11px;color:#6b7280;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.field-label span{color:#ef4444}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;color:#111;background:#f9fafb;appearance:none;-webkit-appearance:none;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#0a1628;background:#fff}
textarea{resize:none;line-height:1.5}
.select-wrap{position:relative}
.select-wrap::after{content:"⌄";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#6b7280;font-size:18px;pointer-events:none}
.prop-info{margin-top:6px;background:#f0f4ff;border-radius:8px;padding:8px 12px;font-size:13px;color:#374151;display:none;line-height:1.5}
.prop-info strong{color:#0a1628;font-weight:600}
.section{margin-top:10px}
.sec-hdr{background:#fff;padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid #f0f0f0}
.sec-left{display:flex;align-items:center;gap:10px}
.sec-icon{font-size:20px}
.sec-name{font-size:15px;font-weight:600;color:#111}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.badge.miss{background:#fef3c7;color:#92400e}
.badge.ok{background:#d1fae5;color:#065f46}
.badge.qty{background:#dbeafe;color:#1e40af}
.chev{font-size:20px;color:#9ca3af;transition:transform .25s;display:inline-block}
.chev.open{transform:rotate(180deg)}
/* Checkbox grid */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px 1.25rem 12px;background:#f0f2f5}
.card{background:#fff;border-radius:14px;cursor:pointer;border:2px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:border-color .15s,background .15s;display:flex;align-items:center;padding:14px;min-height:64px;gap:12px}
.card.ok{border-color:#0a1628;background:#f0f6f0;box-shadow:0 2px 8px rgba(10,22,40,.12)}
.card-check{width:22px;height:22px;border-radius:6px;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;transition:all .15s}
.card.ok .card-check{background:#0a1628;border-color:#0a1628;color:#c9a84c}
.card-name{font-size:14px;color:#111;line-height:1.3;font-weight:600}
/* Qty rows */
.qty-grid{display:flex;flex-direction:column;gap:8px;padding:10px 1.25rem 12px;background:#f0f2f5}
.qty-row{background:#fff;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.qty-row-name{flex:1}
.qty-row-title{font-size:14px;font-weight:600;color:#111;line-height:1.3}
.qty-row-sub{font-size:11px;color:#6b7280;margin-top:1px}
.qty-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qty-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid #d1d5db;background:#fff;font-size:20px;font-weight:500;color:#0a1628;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.qty-btn:active{background:#f0f2f5}
.qty-num{font-size:17px;font-weight:700;color:#9ca3af;min-width:24px;text-align:center}
.qty-num.active{color:#0a1628}
/* Extras */
.extras-section{margin-top:10px;background:#fff}
.extras-hdr{padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid #f0f0f0}
.extras-body{padding:1rem 1.25rem;display:flex;flex-direction:column;gap:14px}
.extras-sub{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.add-row{display:flex;gap:8px}
.add-row input{flex:1}
.btn-add{padding:10px 16px;background:#0a1628;color:#c9a84c;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.custom-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.custom-item{display:flex;align-items:center;gap:10px;background:#fff8ec;border-radius:10px;padding:10px 12px;border:1px solid #f5c842}
.custom-item-name{flex:1;font-size:14px;font-weight:600;color:#7a5800}
.btn-remove{width:28px;height:28px;border-radius:7px;border:none;background:#fee2e2;color:#b91c1c;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* Footer */
.footer{background:#fff;margin-top:10px;padding:1rem 1.25rem 2rem}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat{background:#f9fafb;border-radius:12px;padding:.75rem;text-align:center;border:1px solid #e5e7eb}
.stat-n{font-size:24px;font-weight:700;color:#111}
.stat-n.warn{color:#d97706}
.stat-n.good{color:#059669}
.stat-l{font-size:11px;color:#6b7280;margin-top:2px;font-weight:500}
.btn-group{display:flex;flex-direction:column;gap:10px}
.wa-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-wa{background:#25D366;color:#fff}
.btn-copy{background:#0a1628;color:#c9a84c}
.wa-label{font-size:10px;opacity:.85;display:block;margin-top:2px;font-weight:500}
.rout{margin-top:.85rem;background:#f9fafb;border-radius:12px;padding:1rem;font-size:12.5px;white-space:pre-wrap;display:none;border:1px solid #e5e7eb;color:#374151;line-height:1.6}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#0a1628;color:#c9a84c;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="logo">XTREME-JAX CLEANING SUPPORT INC.</div>
  <div class="title">Inventory Checklist</div>
  <div class="sub">Tap each item that is available</div>
</div>

<div class="fields">

    <input type="text" id="emp" placeholder="Your full name...">
  </div>
  <div>
    <div class="field-label">Property <span>*</span></div>
    <div class="select-wrap">
      <select id="prop" onchange="onPropChange()">
        <option value="">— Select property —</option>

</div>

<div id="sections"></div>

<!-- EXTRA REQUESTS -->
<div class="extras-section">
  <div class="extras-hdr" onclick="toggleExtras()">
    <div class="sec-left">

      <span class="sec-name">Extra Requests</span>

    </div>
    <span class="chev open" id="extras-chev">⌄</span>
  </div>
  <div class="extras-body" id="extras-body">
    <div>
      <div class="extras-sub">Type item and add</div>
      <div class="add-row">
        <input type="text" id="custom-input" placeholder="e.g. Extra hangers, more soap...">
        <button class="btn-add" onclick="addCustomItem()">+ Add</button>
      </div>
      <div class="custom-list" id="custom-list"></div>
    </div>
    <div>
      <div class="extras-sub">Additional notes</div>
      <textarea id="extra-notes" rows="3" placeholder="Any comments or special requests..."></textarea>
    </div>
  </div>
</div>

<div class="footer">
  <div class="stats">
    <div class="stat"><div class="stat-n good" id="n-ok">0</div><div class="stat-l">OK</div></div>
    <div class="stat"><div class="stat-n warn" id="n-miss">0</div><div class="stat-l">Missing</div></div>
    <div class="stat"><div class="stat-n" id="n-tot">0</div><div class="stat-l">Total</div></div>
  </div>

<script>
// ══════════════════════════════════════════════
// SECTION DEFINITIONS
// ══════════════════════════════════════════════

// 1. KITCHEN & HOUSE ITEMS (checkbox) — what stays in the house
const kitchenItems = [
  "Paper towels (2 backups under sink)",
  "Sponge (wrapped)",
  "6 waters in fridge",
  "Dish towels (min 2)",
  "Dish soap (min half full)",
  "Dishwasher pods (min 10)",
  "Trash bags (min 10)",
  "Windex spray (min half full)",
  "Coffee K-Cups",
  "Café / Ground coffee",
  "Sugar",
  "Creamer",
  "Salt",
  "Pepper",
  "Olive oil",
  "Cooking spray",
  "Foil",
  "Plastic wrap",
  "Ziplock bags — Medium",
  "Ziplock bags — Large",
  "Body wash",
  "Shampoo",
  "Conditioner",
  "Hand soap",
  "Toilet paper",
  "Tissue / facial tissue",
  "Air freshener"
];

// 2. SERVICE SUPPLIES (checkbox) — what's needed to do the job
const supplyItems = [
  "Clorox",
  "Mop head",
  "Water (gallons)",
  "Pool towels",
  "Paper towels (service)",
  "Laundry detergent",
  "Suavitel (fabric softener)",
  "Wrinkle releaser spray"
];

// 3. LINENS & BEDDING (qty) — sets needed by size
const linenGroups = [
  { name:"Sheet Set",                  sizes:["King","Queen","Full","Twin"] },
  { name:"Duvet Cover",                sizes:["King","Queen","Full","Twin"] },
  { name:"Duvet Insert",               sizes:["King","Queen","Full","Twin"] },
  { name:"Mattress Protector (Elastic)",sizes:["King","Queen","Full","Twin"] },
  { name:"Mattress Protector (Zipper)", sizes:["King","Queen","Full","Twin"] },
  { name:"Pillowcase Protector",        sizes:["Standard","King"] },
  { name:"Bath towels",                 sizes:["Set of 4"] },
  { name:"Hand towels",                 sizes:["Set of 4"] },
  { name:"Washcloths",                  sizes:["Set of 4"] },
  { name:"Bath mat",                    sizes:["Unit"] }
];

const linenQty = {};
linenGroups.forEach(g => g.sizes.forEach(s => linenQty[g.name+"||"+s] = 0));

// Flat checkbox state
const checkSections = [
  { id:"kitchen",  label:"Kitchen & House Items", icon:"🏠", items: kitchenItems },
  { id:"supplies", label:"Service Supplies",       icon:"🧹", items: supplyItems  }
];
const allCheck = [];
checkSections.forEach((sec,si) => sec.items.forEach((name,ii) => allCheck.push({si,ii,name,state:false})));

const openSec = { kitchen:true, supplies:true, linens:true, extras:true };
const customItems = [];

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function getCheckIdx(si,ii){ return allCheck.findIndex(x=>x.si===si&&x.ii===ii); }

function safeId(key){ return key.replace(/[^a-zA-Z0-9]/g,"_"); }

function onPropChange(){
  const val = document.getElementById("prop").value;
  const info = document.getElementById("prop-info");
  if(!val){ info.style.display="none"; return; }
  const [name,addr] = val.split("|");
  info.innerHTML = `<strong>${name}</strong><br>${addr}`;
  info.style.display = "block";
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render(){
  const cont = document.getElementById("sections");
  cont.innerHTML = "";

  // Checkbox sections
  checkSections.forEach((sec,si) => {
    const miss = allCheck.filter(x=>x.si===si && !x.state).length;
    const isOpen = openSec[sec.id];
    const badgeHtml = miss>0
      ? `<span class="badge miss">${miss} missing</span>`
      : `<span class="badge ok">All good ✓</span>`;
    let gridHtml = "";
    if(isOpen){
      sec.items.forEach((name,ii) => {
        const idx = getCheckIdx(si,ii);
        const ok = allCheck[idx].state;
        gridHtml += `<div class="card${ok?" ok":""}" data-idx="${idx}">
          <div class="card-check">${ok?"✓":""}</div>
          <div class="card-name">${name}</div>
        </div>`;
      });
    }
    const div = document.createElement("div");
    div.className = "section";
    div.innerHTML = `
      <div class="sec-hdr" data-sec="${sec.id}">
        <div class="sec-left">
          <span class="sec-icon">${sec.icon}</span>
          <span class="sec-name">${sec.label}</span>
          ${badgeHtml}
        </div>
        <span class="chev${isOpen?" open":""}">⌄</span>
      </div>
      ${isOpen ? `<div class="grid">${gridHtml}</div>` : ""}`;
    cont.appendChild(div);
  });

  // Linens section
  cont.appendChild(buildLinensSection());

  // Events
  document.querySelectorAll(".sec-hdr[data-sec]").forEach(el => {
    el.addEventListener("click", () => { openSec[el.dataset.sec]=!openSec[el.dataset.sec]; render(); });
  });
  document.querySelectorAll(".card[data-idx]").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.idx);
      allCheck[idx].state = !allCheck[idx].state;
      render();
    });
  });
  document.querySelectorAll(".qty-btn[data-key]").forEach(el => {
    el.addEventListener("click", () => {
      const key = el.dataset.key, delta = parseInt(el.dataset.delta);
      linenQty[key] = Math.max(0, (linenQty[key]||0) + delta);
      const el2 = document.getElementById("qn-"+safeId(key));
      if(el2){ el2.textContent = linenQty[key]; el2.className = "qty-num"+(linenQty[key]>0?" active":""); }
    });
  });

  updateStats();
}

function buildLinensSection(){
  const isOpen = openSec["linens"];
  const totalQty = Object.values(linenQty).reduce((a,b)=>a+b,0);
  const badgeHtml = totalQty>0
    ? `<span class="badge qty">${totalQty} sets needed</span>`
    : `<span class="badge ok">Set quantities needed</span>`;
  let rowsHtml = "";
  if(isOpen){
    linenGroups.forEach(g => {
      g.sizes.forEach(s => {
        const key = g.name+"||"+s;
        const qty = linenQty[key]||0;
        rowsHtml += `
          <div class="qty-row">
            <div class="qty-row-name">
              <div class="qty-row-title">${g.name}</div>
              <div class="qty-row-sub">${s}</div>
            </div>
            <div class="qty-ctrl">
              <button class="qty-btn" data-key="${key}" data-delta="-1">−</button>
              <span class="qty-num${qty>0?" active":""}" id="qn-${safeId(key)}">${qty}</span>
              <button class="qty-btn" data-key="${key}" data-delta="1">+</button>
            </div>
          </div>`;
      });
    });
  }
  const div = document.createElement("div");
  div.className = "section";
  div.innerHTML = `
    <div class="sec-hdr" data-sec="linens">
      <div class="sec-left">
        <span class="sec-icon">🛏️</span>
        <span class="sec-name">Linens & Bedding</span>
        ${badgeHtml}
      </div>
      <span class="chev${isOpen?" open":""}">⌄</span>
    </div>
    ${isOpen ? `<div class="qty-grid">${rowsHtml}</div>` : ""}`;
  return div;
}

function toggleExtras(){
  openSec.extras = !openSec.extras;
  document.getElementById("extras-body").style.display = openSec.extras?"flex":"none";
  document.getElementById("extras-chev").classList.toggle("open", openSec.extras);
}

function addCustomItem(){
  const inp = document.getElementById("custom-input");
  const val = inp.value.trim();
  if(!val) return;
  customItems.push({name:val, qty:1});
  inp.value = "";
  renderCustom();
}
document.getElementById("custom-input").addEventListener("keydown", e => {
  if(e.key==="Enter"){ e.preventDefault(); addCustomItem(); }
});

function renderCustom(){
  const list = document.getElementById("custom-list");
  list.innerHTML = "";
  customItems.forEach((item,idx) => {
    const row = document.createElement("div");
    row.className = "custom-item";
    row.innerHTML = `
      <div class="custom-item-name">${item.name}</div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="chCQ(${idx},-1)">−</button>
        <span class="qty-num active">${item.qty}</span>
        <button class="qty-btn" onclick="chCQ(${idx},1)">+</button>
      </div>
      <button class="btn-remove" onclick="removeCustom(${idx})">×</button>`;
    list.appendChild(row);
  });
  updateExtrasBadge();
}
function chCQ(idx,d){ customItems[idx].qty=Math.max(1,customItems[idx].qty+d); renderCustom(); }
function removeCustom(idx){ customItems.splice(idx,1); renderCustom(); }
function updateExtrasBadge(){
  const badge = document.getElementById("extras-badge");
  const n = customItems.length;
  if(n>0){ badge.textContent=`${n} item${n>1?"s":""} added`; badge.style.background="#fef3c7"; badge.style.color="#92400e"; }
  else { badge.textContent="Optional"; badge.style.background="#e0f2fe"; badge.style.color="#0369a1"; }
}

function updateStats(){
  const ok = allCheck.filter(x=>x.state).length;
  document.getElementById("n-ok").textContent = ok;
  document.getElementById("n-miss").textContent = allCheck.length - ok;
  document.getElementById("n-tot").textContent = allCheck.length;
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

// ── BUILD REPORT (only what's needed / missing) ─────────────────
function buildReport(){
  const emp = document.getElementById("emp").value.trim();
  const propVal = document.getElementById("prop").value;
  if(!emp||!propVal){ showToast("⚠️ Enter your name and select a property"); return null; }
  const [propName,propAddr] = propVal.split("|");
  const now = new Date();
  const ds = now.toLocaleDateString("en-US",{weekday:"short",year:"numeric",month:"short",day:"numeric"});
  const ts = now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});

  let lines = [
    "📋 XTREME-JAX — NEEDS REPORT",
    "─────────────────────────────",
    `Employee : ${emp}`,
    `Property : ${propName}`,
    `Address  : ${propAddr}`,
    `Date     : ${ds} ${ts}`,
    "─────────────────────────────"
  ];

  let hasContent = false;

  // Checkbox sections — only missing
  checkSections.forEach((sec,si) => {
    const miss = allCheck.filter(x=>x.si===si && !x.state);
    if(miss.length){
      lines.push(`\n🔴 ${sec.label.toUpperCase()} — NEEDS RESTOCK:`);
      miss.forEach(x => lines.push(`  • ${x.name}`));
      hasContent = true;
    }
  });

  // Linens — only qty > 0
  const linenNeeded = [];
  linenGroups.forEach(g => {
    g.sizes.forEach(s => {
      const qty = linenQty[g.name+"||"+s]||0;
      if(qty>0) linenNeeded.push(`  • ${g.name} — ${s}: ${qty}`);
    });
  });
  if(linenNeeded.length){
    lines.push("\n🛏️ LINENS & BEDDING NEEDED:");
    lines.push(...linenNeeded);
    hasContent = true;
  }

  // Extras
  const notes = document.getElementById("extra-notes").value.trim();
  if(customItems.length || notes){
    lines.push("\n🛒 EXTRA REQUESTS:");
    customItems.forEach(it => lines.push(`  • ${it.name} — qty: ${it.qty}`));
    if(notes) lines.push(`\n📝 Notes: ${notes}`);
    hasContent = true;
  }

  if(!hasContent){
    lines.push("\n✅ Everything is fully stocked — nothing needed!");
  }

  lines.push("\n─────────────────────────────");
  return lines.join("\n");
}

function showReport(text){
  const rout = document.getElementById("rout");
  rout.textContent = text; rout.style.display = "block";
  rout.scrollIntoView({behavior:"smooth",block:"nearest"});
}
function sendWhatsApp(number){
  const text = buildReport(); if(!text) return;
  showReport(text);
  window.open(`https://wa.me/${number}?text=${encodeURIComponent(text)}`,"_blank");
}
function copyReport(){
  const text = buildReport(); if(!text) return;
  showReport(text);
  if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>showToast("✓ Copied!"));
}

render();
</script>
